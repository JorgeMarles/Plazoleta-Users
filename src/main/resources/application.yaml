spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: plazoletausers

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/plazoleta_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET}


logging:
  level:
    root: INFO
    com.pragma.plazoletausers: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

appDescription: "Plazoleta Users App"
appVersion: "1.0.0"